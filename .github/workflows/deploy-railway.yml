name: Deploy to Railway

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN || secrets.RAILWAY_API_TOKEN || vars.RAILWAY_TOKEN || vars.RAILWAY_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Railway token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Error: Railway token is missing. Set one of: secrets.RAILWAY_TOKEN, secrets.RAILWAY_API_TOKEN, vars.RAILWAY_TOKEN, vars.RAILWAY_API_TOKEN."
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.58.0

      - name: Deploy to Railway
        run: railway up --detach
