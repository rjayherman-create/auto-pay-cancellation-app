version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: autopay-postgres
    environment:
      POSTGRES_USER: autopay_user
      POSTGRES_PASSWORD: autopay_password_secure
      POSTGRES_DB: autopay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - autopay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopay_user -d autopay_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Production Studio Container
  production-studio:
    build: .
    container_name: production-studio
    ports:
      - "5000:5000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./uploads:/app/uploads
      - ./projects:/app/projects
    restart: unless-stopped
    networks:
      - production-studio-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  production-studio-network:
    driver: bridge
  autopay-network:
    driver: bridge

volumes:
  uploads:
    driver: local
  projects:
    driver: local
  postgres_data:
    driver: local
